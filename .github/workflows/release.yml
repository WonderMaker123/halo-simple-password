name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build
        run: ./gradlew build

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${GITHUB_REF#refs/tags/}
        run: |
          # Find the JAR file
          JAR_FILE=$(ls build/libs/*.jar | head -1)
          echo "Found JAR: $JAR_FILE"

          # Create draft release
          RESP=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/$GITHUB_REPOSITORY/releases \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"draft\":true}")
          RELEASE_ID=$(echo $RESP | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          echo "Created release ID: $RELEASE_ID"

          # Upload JAR
          UPLOAD_RESP=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/java-archive" \
            --data-binary "@$JAR_FILE" \
            "https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?name=$(basename $JAR_FILE)")
          echo "Upload response: $UPLOAD_RESP" | python3 -c "import sys; import json; d=json.loads(sys.stdin.read().replace('Upload response: ','')); print('URL:', d.get('browser_download_url', d.get('message','')))"
